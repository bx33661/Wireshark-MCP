name: CI

on:
  push:
    branches: [ "master", "main", "codex/**" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Ruff lint
      run: ruff check src/ tests/

    - name: Ruff format check
      run: ruff format --check src/ tests/

    - name: Type check
      run: mypy --package wireshark_mcp --ignore-missing-imports --no-namespace-packages

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=wireshark_mcp --cov-report=term-missing -v

    - name: Compile check
      run: python -m compileall src/

  integration-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Install TShark
      run: |
        sudo apt-get update
        sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y tshark
        tshark -v

    - name: Run Linux TShark integration smoke tests
      run: |
        pytest tests/test_client.py -k "real_tshark" -v
